<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analizador Web — SEO · AEO · GEO · Velocidad</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B1220;--bg2:#111827;--bg3:#0F1A2E;--bg4:#162035;--ind:#4F46E5;--ind2:#6366F1;--ind3:#818CF8;--lime:#A3E635;--lime2:#BEF264;--red:#EF4444;--amber:#F59E0B;--green:#22C55E;--white:#FFFFFF;--gray:#94A3B8;--gray2:#64748B;--bord:rgba(255,255,255,0.07);--px:clamp(2rem,6vw,5rem);--fh:'General Sans',sans-serif;--fm:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:var(--fh);min-height:100vh}

header{padding:1.2rem var(--px);border-bottom:1px solid var(--bord);display:flex;align-items:center;justify-content:space-between;background:rgba(11,18,32,.95);position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo svg{width:28px;height:28px}
.logo-wm{font-size:16px;font-weight:700;color:var(--white)}
.logo-wm b{color:var(--ind3)}
.back-link{font-size:13px;color:var(--gray);text-decoration:none;display:flex;align-items:center;gap:6px}
.back-link:hover{color:var(--white)}

/* INPUT */
.input-section{padding:2.5rem var(--px) 1.5rem;background:var(--bg2);border-bottom:1px solid var(--bord)}
.input-title{font-size:1.3rem;font-weight:700;letter-spacing:-.5px;margin-bottom:.4rem}
.input-sub{font-size:13px;color:var(--gray);font-weight:300;margin-bottom:1.2rem}
.input-row{display:flex;gap:10px;max-width:680px}
.url-inp{flex:1;background:var(--bg3);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:12px 16px;font-size:14px;color:var(--white);font-family:var(--fh);outline:none;transition:border-color .18s}
.url-inp:focus{border-color:var(--ind2)}
.url-inp::placeholder{color:var(--gray2)}
.analyze-btn{background:var(--ind);color:var(--white);border:none;border-radius:9px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fh);white-space:nowrap;display:flex;align-items:center;gap:8px;transition:background .18s}
.analyze-btn:hover{background:var(--ind2)}
.analyze-btn:disabled{opacity:.5;cursor:not-allowed}
.analyze-btn .spin{animation:spin .8s linear infinite;display:none}
.analyze-btn.loading .spin{display:inline}
.analyze-btn.loading .ico{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOADING */
.loading-section{display:none;padding:3rem var(--px)}
.loading-section.active{display:block}
.loading-steps-list{max-width:500px;display:flex;flex-direction:column;gap:10px;margin-top:1.5rem}
.load-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--gray2);font-family:var(--fm)}
.load-step.active{color:var(--ind3)}
.load-step.done{color:var(--green)}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--gray2);flex-shrink:0}
.load-step.active .step-dot{background:var(--ind3);animation:p .8s ease-in-out infinite}
.load-step.done .step-dot{background:var(--green)}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}

/* ERROR */
.error-section{display:none;padding:2rem var(--px)}
.error-section.active{display:block}
.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:1.2rem 1.5rem;font-size:13px;color:var(--red)}

/* RESULTS */
.results-section{display:none;padding:2rem var(--px) 4rem}
.results-section.active{display:block}

/* SCORE OVERVIEW */
.score-overview{background:var(--bg2);border:1px solid var(--bord);border-radius:20px;padding:2rem;margin-bottom:1.5rem;display:grid;grid-template-columns:130px 1fr;gap:2.5rem;align-items:center}
.ring-wrap{position:relative;width:130px;height:130px}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:10}
.ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.5s ease}
.ring-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.2rem;font-weight:700;font-family:var(--fm);line-height:1}
.ring-label{text-align:center;font-size:11px;color:var(--gray);margin-top:4px}
.overview-right{}
.overview-url{font-family:var(--fm);font-size:12px;color:var(--ind3);margin-bottom:.5rem;word-break:break-all}
.overview-verdict{font-size:1.1rem;font-weight:600;margin-bottom:.4rem}
.overview-summary{font-size:13px;color:var(--gray);line-height:1.65;font-weight:300;margin-bottom:1rem}
.mini-scores{display:flex;gap:1.5rem;flex-wrap:wrap}
.mini-s{text-align:center}
.mini-v{font-family:var(--fm);font-size:1.1rem;font-weight:700;line-height:1;margin-bottom:3px}
.mini-l{font-size:10px;color:var(--gray2)}

/* WARNING BOX (analyze fallido) */
.warning-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:14px 18px;margin-bottom:1.2rem}
.warning-title{font-size:13px;font-weight:600;color:var(--amber);margin-bottom:6px}
.warning-item{font-size:12px;color:var(--gray);line-height:1.5;margin-top:3px}

/* CRITICAL ALERTS BOX */
.alerts-box{background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(245,158,11,.04));border:1px solid rgba(239,68,68,.2);border-radius:14px;padding:18px 20px;margin-bottom:1.5rem}
.alerts-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--red);display:flex;align-items:center;gap:8px}
.alert-row{display:flex;gap:12px;padding:9px 0;border-top:1px solid rgba(255,255,255,.04);font-size:12.5px;line-height:1.55}
.alert-row:first-of-type{border-top:0}
.alert-num{font-family:var(--fm);font-size:11px;font-weight:700;color:var(--red);flex-shrink:0;width:18px}
.alert-text{color:var(--gray)}
.alert-text b{color:var(--white);font-weight:500}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{font-size:12px;font-weight:500;padding:7px 16px;border-radius:20px;border:1px solid var(--bord);background:transparent;color:var(--gray);cursor:pointer;transition:all .15s;font-family:var(--fh)}
.tab:hover{color:var(--white);border-color:rgba(255,255,255,.2)}
.tab.active{background:var(--ind);color:var(--white);border-color:var(--ind)}
.tab .badge{display:inline-block;background:rgba(255,255,255,.15);border-radius:10px;padding:1px 7px;margin-left:5px;font-size:10px}

/* PANELS */
.panel{display:none}
.panel.active{display:block}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-bottom:1.5rem}
.card{background:var(--bg2);border:1px solid var(--bord);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px}
.card.g::before{background:var(--green)}
.card.a::before{background:var(--amber)}
.card.r::before{background:var(--red)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-name{font-size:13px;font-weight:600}
.card-score{font-family:var(--fm);font-size:12px;font-weight:700;padding:2px 9px;border-radius:20px}
.sg{background:rgba(34,197,94,.12);color:var(--green)}
.sa{background:rgba(245,158,11,.12);color:var(--amber)}
.sr{background:rgba(239,68,68,.12);color:var(--red)}
.bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:12px}
.bar-fill{height:100%;border-radius:2px;transition:width 1s ease}
.checks{display:flex;flex-direction:column;gap:6px}
.chk{display:flex;align-items:flex-start;gap:8px;font-size:12px;line-height:1.5}
.cdot{width:15px;height:15px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.cok{background:rgba(34,197,94,.12);color:var(--green)}
.cwarn{background:rgba(245,158,11,.12);color:var(--amber)}
.cfail{background:rgba(239,68,68,.12);color:var(--red)}
.ctext{color:var(--gray)}
.ctext b{color:var(--white);font-weight:500}

/* DIMENSION BARS — para AEO Citability */
.dim-row{display:grid;grid-template-columns:130px 1fr 50px;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px}
.dim-row:last-child{border-bottom:0}
.dim-name{color:var(--gray);font-weight:500}
.dim-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.dim-fill{height:100%;border-radius:3px;transition:width 1s ease}
.dim-num{font-family:var(--fm);font-size:11px;font-weight:700;text-align:right}

/* ISSUES */
.issues-wrap{background:var(--bg2);border:1px solid var(--bord);border-radius:14px;padding:20px;margin-bottom:1.5rem}
.issues-title{font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.issue{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid var(--bord);margin-bottom:8px}
.issue:last-child{margin-bottom:0}
.iprio{font-family:var(--fm);font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;white-space:nowrap;margin-top:2px}
.ph{background:rgba(239,68,68,.12);color:var(--red)}
.pm{background:rgba(245,158,11,.12);color:var(--amber)}
.pl{background:rgba(34,197,94,.12);color:var(--green)}
.itext{font-size:12px;color:var(--gray);line-height:1.5}
.itext b{color:var(--white);font-weight:500;display:block;margin-bottom:2px}
.icat{font-family:var(--fm);font-size:10px;color:var(--gray2);text-align:right;white-space:nowrap}

/* RAW DATA */
.raw-section{background:var(--bg2);border:1px solid var(--bord);border-radius:14px;padding:20px;margin-bottom:1.5rem}
.raw-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.raw-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.raw-item{background:rgba(255,255,255,.03);border:1px solid var(--bord);border-radius:8px;padding:12px}
.raw-key{font-family:var(--fm);font-size:10px;color:var(--gray2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.raw-val{font-size:13px;color:var(--white);word-break:break-all;line-height:1.4}
.raw-val.ok{color:var(--green)}
.raw-val.fail{color:var(--red)}
.raw-val.warn{color:var(--amber)}

/* COPY BUTTON */
.copy-btn{background:var(--bg3);border:1px solid var(--bord);color:var(--white);font-size:11px;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:var(--fh);display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.copy-btn:hover{border-color:var(--ind3);color:var(--ind3)}
.copy-btn.copied{background:rgba(34,197,94,.12);color:var(--green);border-color:var(--green)}

/* CODE BLOCK */
.code-block{font-family:var(--fm);font-size:11.5px;color:var(--gray);background:var(--bg);border:1px solid var(--bord);border-radius:8px;padding:14px;white-space:pre-wrap;line-height:1.6;max-height:400px;overflow-y:auto;margin-top:12px}

/* CTA */
.results-cta{background:linear-gradient(135deg,rgba(79,70,229,.12),rgba(163,230,53,.04));border:1px solid rgba(99,102,241,.2);border-radius:16px;padding:2rem;text-align:center}
.results-cta h3{font-size:1.2rem;font-weight:700;margin-bottom:.4rem}
.results-cta p{color:var(--gray);font-size:13px;font-weight:300;margin-bottom:1.2rem}
.cta-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-lime{background:var(--lime);color:var(--bg);font-size:13px;font-weight:700;padding:11px 22px;border-radius:8px;border:none;cursor:pointer;font-family:var(--fh);text-decoration:none;transition:background .18s}
.btn-lime:hover{background:var(--lime2)}
.btn-ghost{background:transparent;color:var(--white);font-size:13px;padding:11px 22px;border-radius:8px;border:1px solid rgba(255,255,255,.14);cursor:pointer;font-family:var(--fh);text-decoration:none}

@media(max-width:700px){.score-overview{grid-template-columns:1fr;gap:1.5rem;text-align:center}.input-row{flex-direction:column}.analyze-btn{width:100%;justify-content:center}.cards-grid{grid-template-columns:1fr}.issue{grid-template-columns:auto 1fr}.dim-row{grid-template-columns:90px 1fr 40px}}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#4F46E5"/><path d="M7 22L12.5 12L17.5 18L21 13.5L25 16" stroke="#A3E635" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="25" cy="9.5" r="3" fill="#A3E635"/></svg>
    <span class="logo-wm">Agen<b>cia</b></span>
  </a>
  <a href="/" class="back-link">← Volver a la web</a>
</header>

<div class="input-section">
  <div class="input-title">Analizador web gratuito</div>
  <div class="input-sub">SEO · AEO · GEO · Velocidad · Schema · Citabilidad LLM · llms.txt</div>
  <div class="input-row">
    <input class="url-inp" type="url" id="urlInput" placeholder="https://tuempresa.com" autocomplete="off">
    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">
      <svg class="ico" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="white" stroke-width="1.5"/><path d="M9.5 9.5L12 12" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      <svg class="spin" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="rgba(255,255,255,.3)" stroke-width="2"/><path d="M7 2a5 5 0 015 5" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      Analizar
    </button>
  </div>
</div>

<div class="loading-section" id="loadingSection">
  <div style="font-size:14px;font-weight:500;color:var(--gray)">Analizando tu web...</div>
  <div class="loading-steps-list" id="stepsList"></div>
</div>

<div class="error-section" id="errorSection">
  <div class="error-box" id="errorBox"></div>
</div>

<div class="results-section" id="resultsSection"></div>

<script>
const STEPS = [
  'Conectando con la web...',
  'Ejecutando Google PageSpeed...',
  'Crawleando páginas del sitio...',
  'Analizando schema markup...',
  'Calculando AEO Citability Score...',
  'Generando llms.txt sugerido...',
  'Compilando diagnóstico...'
];

let stepInterval;

function showSteps() {
  const list = document.getElementById('stepsList');
  list.innerHTML = STEPS.map((s,i) => `
    <div class="load-step" id="step${i}">
      <div class="step-dot"></div>${s}
    </div>`).join('');
  let cur = 0;
  document.getElementById('step0').classList.add('active');
  stepInterval = setInterval(() => {
    if (cur < STEPS.length - 1) {
      document.getElementById('step' + cur).classList.remove('active');
      document.getElementById('step' + cur).classList.add('done');
      cur++;
      document.getElementById('step' + cur).classList.add('active');
    }
  }, 2000);
}

function clearSteps() {
  clearInterval(stepInterval);
}

function normalizeUrl(u) {
  u = u.trim();
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
  return u;
}

function scoreColor(s) { return s >= 80 ? 'var(--green)' : s >= 50 ? 'var(--amber)' : 'var(--red)'; }
function scoreClass(s) { return s >= 80 ? 'g' : s >= 50 ? 'a' : 'r'; }
function badgeClass(s) { return s >= 80 ? 'sg' : s >= 50 ? 'sa' : 'sr'; }
function dotClass(ok, warn) { return ok ? 'cok' : warn ? 'cwarn' : 'cfail'; }
function dotChar(ok, warn) { return ok ? '✓' : warn ? '!' : '✕'; }
function chk(ok, warn, html) {
  return `<div class="chk"><div class="cdot ${dotClass(ok,warn)}">${dotChar(ok,warn)}</div><span class="ctext">${html}</span></div>`;
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function analyze() {
  const raw = document.getElementById('urlInput').value;
  if (!raw.trim()) return;
  const url = normalizeUrl(raw);
  const btn = document.getElementById('analyzeBtn');

  btn.disabled = true;
  btn.classList.add('loading');
  document.getElementById('loadingSection').classList.add('active');
  document.getElementById('errorSection').classList.remove('active');
  document.getElementById('resultsSection').classList.remove('active');
  document.getElementById('resultsSection').innerHTML = '';
  showSteps();

  try {
    // Llamadas en paralelo: analyze (home + PageSpeed) + crawl (sitio completo)
    // Tolerante a fallos: si UNO de los dos responde, mostramos resultados
    const [analyzeRes, crawlRes] = await Promise.allSettled([
      fetchWithTimeout('/api/analyze?url=' + encodeURIComponent(url), 28000),
      fetchWithTimeout('/api/crawl?url=' + encodeURIComponent(url) + '&max=10', 28000)
    ]);

    clearSteps();
    document.getElementById('loadingSection').classList.remove('active');

    const data = analyzeRes.status === 'fulfilled' ? analyzeRes.value : null;
    const crawl = crawlRes.status === 'fulfilled' ? crawlRes.value : null;

    // Si ambos fallaron, error
    if (!data && !crawl) {
      const reasons = [];
      if (analyzeRes.status === 'rejected') reasons.push('analyze: ' + analyzeRes.reason.message);
      if (crawlRes.status === 'rejected') reasons.push('crawl: ' + crawlRes.reason.message);
      throw new Error(reasons.join(' · '));
    }

    // Avisos sobre qué falló (banner amarillo arriba)
    const warnings = [];
    if (!data) warnings.push('PageSpeed no respondió a tiempo. Mostramos análisis técnico del sitio sin datos de velocidad.');
    if (!crawl) warnings.push('No se pudo crawlear el sitio. Mostramos solo análisis de la home.');

    renderResults(data, crawl, { url, warnings });
  } catch(err) {
    clearSteps();
    document.getElementById('loadingSection').classList.remove('active');
    document.getElementById('errorBox').textContent = 'Error al analizar: ' + err.message + '. Verifica que la URL sea válida e intenta de nuevo.';
    document.getElementById('errorSection').classList.add('active');
  }

  btn.disabled = false;
  btn.classList.remove('loading');
}

async function fetchWithTimeout(url, timeoutMs) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('timeout');
    throw e;
  }
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function renderResults(d, crawl, ctx) {
  ctx = ctx || {};
  d = d || {}; // si analyze falló, d viene null → trabajamos con crawl

  // Crawl-derived: la home (primera página o coincidente con la URL)
  const targetUrl = d.url || ctx.url || crawl?.site;
  const homePage = crawl?.pages?.find(p =>
    p.url === targetUrl || p.url === targetUrl + '/' ||
    p.url === crawl?.site || p.url === crawl?.site + '/'
  ) || crawl?.pages?.[0];

  // ── Datos crudos: prioridad a analyze, fallback a crawl ──
  const psM  = d.pagespeed?.mobile;          // null si analyze falló
  const psD  = d.pagespeed?.desktop;
  // html_analysis viene de analyze. Si no, usamos los datos del homePage del crawl
  const ha   = d.html_analysis || (homePage ? {
    title: homePage.title,
    meta_description: homePage.meta,
    headings: homePage.headings,
    canonical: homePage.canonical,
    hreflang: homePage.hreflang,
    open_graph: homePage.open_graph,
    twitter_card: { value: homePage.twitter_card, ok: !!homePage.twitter_card },
    schema: homePage.schema,
    technical: { ...(homePage.technical || {}), https: (homePage.url || '').startsWith('https://') },
    images: homePage.images,
    links: homePage.links ? { internal: homePage.links.internal_count, external: homePage.links.external_count } : null,
  } : {});

  const rb   = d.robots;
  const sm   = d.sitemap || (crawl ? { exists: crawl.discovery?.source?.includes('sitemap'), url_count: crawl.discovery?.total_discovered } : null);
  const ll   = d.llms_txt;

  const citability = homePage?.citability;
  const schemaVal = homePage?.schema_validation;
  const llmsTxt = crawl?.llms_txt_suggested;
  const crawlSummary = crawl?.analysis?.summary;
  const crawlIssues = crawl?.analysis?.issues;
  // hasAnalyze: solo true si analyze devolvió scores reales (no null/undefined)
  const hasAnalyze = !!(d.pagespeed && (d.pagespeed.mobile?.scores?.performance != null || d.pagespeed.desktop?.scores?.performance != null));

  // ── Scores PageSpeed (NUEVA estructura: ya viene 0-100 en .scores) ──
  // Si analyze falló, todos null → ocultaremos esa sección
  const perfM   = psM?.scores?.performance ?? null;
  const perfD   = psD?.scores?.performance ?? null;
  const seoLH   = psM?.scores?.seo ?? null;
  const a11y    = psM?.scores?.accessibility ?? null;
  const bestP   = psM?.scores?.best_practices ?? null;

  // ── Lab metrics (NUEVA estructura: psM.lab_metrics) ──
  const lcp     = psM?.lab_metrics?.lcp;
  const fcp     = psM?.lab_metrics?.fcp;
  const cls     = psM?.lab_metrics?.cls;
  const tbt     = psM?.lab_metrics?.tbt;
  const lcpOk   = lcp?.rating === 'good';
  const fcpOk   = fcp?.rating === 'good';
  const clsOk   = cls?.rating === 'good';
  const tbtOk   = tbt?.rating === 'good';

  // ── Oportunidades de PageSpeed (nueva estructura: psM.opportunities) ──
  const opps = psM?.opportunities || [];
  const hasRedirects = opps.find(o => o.id === 'redirects');
  const hasUnusedJS = opps.find(o => o.id === 'unused-javascript');
  const hasRenderBlocking = opps.find(o => o.id === 'render-blocking-resources');
  const hasModernImages = opps.find(o => o.id === 'modern-image-formats');
  const hasTextCompression = opps.find(o => o.id === 'uses-text-compression');

  // CWV
  const passesCwvMobile = d.pagespeed?.summary?.passes_cwv?.mobile;
  const passesCwvDesktop = d.pagespeed?.summary?.passes_cwv?.desktop;

  // ── SEO score (combina LH + HTML analysis, o solo HTML si LH no está) ──
  const seoChecks = [
    ha?.technical?.https,
    ha?.title?.ok,
    ha?.meta_description?.ok,
    ha?.headings?.ok,
    ha?.canonical?.ok,
    ha?.open_graph?.ok,
    ha?.images?.ok,
    !!(ha?.headings?.h2_count > 0)
  ].filter(Boolean).length;
  const seoScore = seoLH != null
    ? Math.round(seoLH * 0.5 + (seoChecks/8)*100*0.5)
    : Math.round((seoChecks/8)*100);

  // ── AEO score: ahora usa el citability real si está, fallback a checks básicos ──
  let aeoScore;
  if (citability) {
    aeoScore = citability.score;
  } else {
    const aeoChecks = [
      ha?.schema?.has_schema, ha?.schema?.has_organization, ha?.schema?.has_faq,
      ha?.schema?.has_breadcrumb, ha?.schema?.has_article,
      !!(ha?.headings?.h2_count > 1 && ha?.headings?.h3_count > 0),
      ll?.exists
    ].filter(Boolean).length;
    aeoScore = Math.round((aeoChecks/7)*100);
  }

  // GEO score
  const geoChecks = [
    ha?.schema?.has_local_business,
    !!(ha?.schema?.types?.includes?.('Organization')),
    ha?.hreflang?.ok,
    rb?.exists,
    sm?.exists
  ].filter(Boolean).length;
  const geoScore = Math.round((geoChecks/5)*100);

  // Fundamentos
  const fundChecks = [
    ha?.technical?.https, ha?.technical?.has_viewport, ha?.technical?.has_charset,
    a11y != null && a11y >= 80, !hasRedirects, !!ha?.technical?.lang
  ].filter(Boolean).length;
  const fundScore = Math.round((fundChecks/6)*100);

  // Score global: si no hay PageSpeed, lo recalculamos sin perfM
  const global = hasAnalyze && perfM != null
    ? Math.round(perfM*0.25 + seoScore*0.3 + aeoScore*0.2 + geoScore*0.1 + fundScore*0.15)
    : Math.round(seoScore*0.4 + aeoScore*0.3 + geoScore*0.15 + fundScore*0.15);
  const gc = scoreColor(global);
  const circ = 2 * Math.PI * 54;
  const offset = circ - (global/100)*circ;
  const verdict = global >= 80 ? '✦ Muy buena presencia digital' : global >= 60 ? '⚡ Presencia mejorable' : global >= 40 ? '⚠ Problemas importantes' : '✕ Presencia digital deficiente';

  // ── ISSUES priorizados ──
  const issues = [];
  if (!ha?.technical?.https)        issues.push({p:'high',t:'Sin HTTPS',d:'Penalización directa de Google. Instala SSL.',cat:'SEO'});
  if (hasAnalyze && hasRedirects)   issues.push({p:'high',t:`Cadena de redirects (${hasRedirects.savings_ms}ms perdidos)`,d:'Múltiples 301 antes del HTML. Configura redirect directo.',cat:'Velocidad'});
  if (!ha?.title?.ok)               issues.push({p:'high',t:'Title tag fuera de rango',d:`Actual: "${escapeHtml(ha?.title?.value||'ninguno')}" (${ha?.title?.length||0} chars). Objetivo: 30-60.`,cat:'SEO'});
  if (!ha?.meta_description?.ok)    issues.push({p:'high',t:'Meta description fuera de rango',d:`Actual: ${ha?.meta_description?.length||0} chars. Objetivo: 120-160.`,cat:'SEO'});
  if (ha?.headings?.h1_count !== 1) issues.push({p:'high',t:`H1 incorrecto (${ha?.headings?.h1_count||0} encontrados)`,d:'Debe haber exactamente 1 H1 por página.',cat:'SEO'});
  if (!ha?.schema?.has_schema && !ha?.schema?.count) issues.push({p:'high',t:'Sin schema markup (JSON-LD)',d:'Los crawlers de IA no pueden leer tu contenido. Añade JSON-LD básico.',cat:'AEO'});
  if (!ha?.schema?.has_organization)issues.push({p:'high',t:'Sin Organization schema',d:'No aparecerás en Knowledge Panel ni en respuestas de IA generativas.',cat:'AEO'});
  if (hasAnalyze && passesCwvMobile === false) issues.push({p:'high',t:'No pasa Core Web Vitals en móvil',d:'Datos reales de usuarios indican performance deficiente. Riesgo de ranking.',cat:'Velocidad'});
  if (!ha?.canonical?.ok)           issues.push({p:'med', t:'Sin canonical tag',d:'Riesgo de contenido duplicado y dilución de autoridad SEO.',cat:'SEO'});
  if (!ha?.open_graph?.ok)          issues.push({p:'med', t:'Open Graph incompleto',d:`Falta: ${[!ha?.open_graph?.title&&'og:title',!ha?.open_graph?.description&&'og:description',!ha?.open_graph?.image&&'og:image'].filter(Boolean).join(', ')||'algún campo'}`,cat:'Social'});
  if (!ha?.schema?.has_faq)         issues.push({p:'med', t:'Sin FAQPage schema',d:'Pierdes featured snippets y respuestas de ChatGPT/Gemini.',cat:'AEO'});
  if (!ha?.schema?.has_local_business)issues.push({p:'med',t:'Sin LocalBusiness schema',d:'Imprescindible para aparecer en búsquedas locales y Google Maps.',cat:'GEO'});
  if (!ha?.hreflang?.ok && !(ha?.hreflang?.count >= 1)) issues.push({p:'med', t:'Sin hreflang',d:'Si operas en España y Latam, el hreflang es imprescindible.',cat:'GEO'});
  if (hasAnalyze && !lcpOk && lcp)  issues.push({p:'med', t:`LCP lento: ${lcp.display}`,d:'Objetivo: <2.5s. Optimiza imágenes y elimina render-blocking.',cat:'Velocidad'});
  if (hasAnalyze && !clsOk && cls)  issues.push({p:'med', t:`CLS inestable: ${cls.display}`,d:'La página se mueve al cargar. Mala UX y penalización Google.',cat:'Velocidad'});
  if (hasAnalyze && hasUnusedJS)    issues.push({p:'med', t:`JavaScript no usado: ${Math.round((hasUnusedJS.savings_bytes||0)/1024)}KB`,d:`${hasUnusedJS.affected_count} archivos con código innecesario.`,cat:'Velocidad'});
  if (hasAnalyze && hasRenderBlocking) issues.push({p:'med', t:'Recursos bloqueantes',d:`${hasRenderBlocking.affected_count} archivos bloquean el render inicial.`,cat:'Velocidad'});
  if (rb && !rb.exists)             issues.push({p:'med', t:'Sin robots.txt',d:'Crea un robots.txt para controlar la indexación.',cat:'SEO'});
  if (sm && !sm.exists)             issues.push({p:'med', t:'Sin sitemap.xml',d:'El sitemap ayuda a Google a descubrir e indexar todas tus páginas.',cat:'SEO'});
  if (ll && !ll.exists)             issues.push({p:'low', t:'Sin llms.txt',d:'Añade llms.txt para orientar a ChatGPT, Perplexity y Gemini.',cat:'AEO'});
  if ((ha?.images?.without_alt||0)>0)issues.push({p:'low',t:`${ha.images.without_alt} imágenes sin alt`,d:'El alt text es esencial para SEO y accesibilidad.',cat:'SEO'});
  if (hasAnalyze && hasModernImages) issues.push({p:'low', t:'Imágenes en formato antiguo',d:'Convierte a WebP/AVIF. Ahorra ~30-50% de peso.',cat:'Velocidad'});
  if (hasAnalyze && hasTextCompression) issues.push({p:'low', t:'Sin compresión de texto',d:'Activa gzip/brotli en el servidor.',cat:'Velocidad'});

  // Crawl-level issues (sitio completo)
  if (crawlIssues) {
    if (crawlIssues.duplicate_titles > 0) issues.push({p:'med',t:`${crawlIssues.duplicate_titles} titles duplicados`,d:`Páginas con el mismo title en el sitio.`,cat:'SEO sitio'});
    if (crawlIssues.missing_canonical >= 3) issues.push({p:'med',t:`${crawlIssues.missing_canonical} páginas sin canonical`,d:`Riesgo de contenido duplicado en todo el sitio.`,cat:'SEO sitio'});
    if (crawlIssues.broken_internal_links > 0) issues.push({p:'high',t:`${crawlIssues.broken_internal_links} links internos rotos`,d:`URLs enlazadas que devuelven 4xx/5xx.`,cat:'SEO sitio'});
  }

  const prioOrder = {high:0,med:1,low:2};
  issues.sort((a,b) => prioOrder[a.p]-prioOrder[b.p]);

  // 3 alertas críticas para el banner ejecutivo
  const top3Critical = issues.filter(i => i.p === 'high').slice(0, 3);

  const hostname = (() => { try { return new URL(d.url).hostname; } catch(e) { return d.url; }})();

  // ── HTML ──
  const html = `
  ${ctx.warnings && ctx.warnings.length ? `
  <div class="warning-box">
    <div class="warning-title">⚠ Análisis parcial</div>
    ${ctx.warnings.map(w => `<div class="warning-item">${escapeHtml(w)}</div>`).join('')}
  </div>
  ` : ''}

  <div class="score-overview">
    <div>
      <div class="ring-wrap">
        <svg viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="54"/>
          <circle class="ring-fill" cx="60" cy="60" r="54" stroke="${gc}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="ring-num" style="color:${gc}">${global}</div>
      </div>
      <div class="ring-label">Puntuación global</div>
    </div>
    <div class="overview-right">
      <div class="overview-url">${escapeHtml(hostname)}</div>
      <div class="overview-verdict" style="color:${gc}">${verdict}</div>
      <div class="overview-summary">${issues.filter(i=>i.p==='high').length} problemas críticos · ${issues.filter(i=>i.p==='med').length} medios · ${issues.filter(i=>i.p==='low').length} menores detectados${crawlSummary?` · ${crawlSummary.pages_analyzed} páginas analizadas del sitio`:''}.</div>
      <div class="mini-scores">
        ${hasAnalyze ? `<div class="mini-s"><div class="mini-v" style="color:${scoreColor(perfM)}">${perfM}</div><div class="mini-l">Velocidad</div></div>` : ''}
        <div class="mini-s"><div class="mini-v" style="color:${scoreColor(seoScore)}">${seoScore}</div><div class="mini-l">SEO</div></div>
        <div class="mini-s"><div class="mini-v" style="color:${scoreColor(aeoScore)}">${aeoScore}</div><div class="mini-l">AEO</div></div>
        <div class="mini-s"><div class="mini-v" style="color:${scoreColor(geoScore)}">${geoScore}</div><div class="mini-l">GEO</div></div>
        <div class="mini-s"><div class="mini-v" style="color:${scoreColor(fundScore)}">${fundScore}</div><div class="mini-l">Fundamentos</div></div>
        ${hasAnalyze ? `<div class="mini-s"><div class="mini-v" style="color:${scoreColor(a11y)}">${a11y}</div><div class="mini-l">Accesibilidad</div></div>` : ''}
      </div>
    </div>
  </div>

  ${top3Critical.length > 0 ? `
  <div class="alerts-box">
    <div class="alerts-title">⚠ Top ${top3Critical.length} problemas críticos detectados</div>
    ${top3Critical.map((i, idx) => `
      <div class="alert-row">
        <div class="alert-num">${idx+1}.</div>
        <div class="alert-text"><b>${escapeHtml(i.t)}</b> — ${escapeHtml(i.d)}</div>
      </div>
    `).join('')}
  </div>
  ` : ''}

  <div class="tabs">
    <button class="tab active" onclick="switchTab(event,'issues')">⚠ Problemas <span class="badge">${issues.length}</span></button>
    ${hasAnalyze ? `<button class="tab" onclick="switchTab(event,'speed')">⚡ Velocidad</button>` : ''}
    <button class="tab" onclick="switchTab(event,'seo')">🔍 SEO</button>
    <button class="tab" onclick="switchTab(event,'aeo')">🤖 AEO</button>
    <button class="tab" onclick="switchTab(event,'geo')">📍 GEO</button>
    ${llmsTxt ? `<button class="tab" onclick="switchTab(event,'llms')">📝 llms.txt</button>` : ''}
    <button class="tab" onclick="switchTab(event,'raw')">📋 Datos raw</button>
  </div>

  <!-- ISSUES -->
  <div class="panel active" id="panel-issues">
    <div class="issues-wrap">
      <div class="issues-title"><span style="color:var(--red)">⚠</span> ${issues.length} problemas ordenados por impacto</div>
      ${issues.map(i=>`
        <div class="issue">
          <span class="iprio ${i.p==='high'?'ph':i.p==='med'?'pm':'pl'}">${i.p==='high'?'CRÍTICO':i.p==='med'?'MEDIO':'BAJO'}</span>
          <div class="itext"><b>${escapeHtml(i.t)}</b>${escapeHtml(i.d)}</div>
          <span class="icat">${escapeHtml(i.cat)}</span>
        </div>`).join('')}
    </div>
    <div class="results-cta">
      <h3>¿Quieres que lo arreglemos?</h3>
      <p>Diagnóstico gratuito → implementación 4-6 semanas → optimización continua.</p>
      <div class="cta-btns">
        <a class="btn-lime" href="mailto:hola@agencia.ai?subject=Análisis web ${escapeHtml(hostname)}">Solicitar diagnóstico personalizado</a>
        <a class="btn-ghost" href="/">Volver a la web</a>
      </div>
    </div>
  </div>

  <!-- SPEED -->
  ${hasAnalyze ? `
  <div class="panel" id="panel-speed">
    <div class="cards-grid">
      <div class="card ${scoreClass(perfM)}">
        <div class="card-head"><span class="card-name">⚡ Velocidad Mobile</span><span class="card-score ${badgeClass(perfM)}">${perfM}/100</span></div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${perfM}%;background:${scoreColor(perfM)}"></div></div>
        <div class="checks">
          ${chk(lcpOk, lcp?.rating==='needs_improvement', `<b>LCP</b> ${lcp?.display||'?'} ${lcpOk?'— excelente':'— objetivo &lt;2.5s'}`)}
          ${chk(fcpOk, fcp?.rating==='needs_improvement', `<b>FCP</b> ${fcp?.display||'?'} ${fcpOk?'— rápido':'— objetivo &lt;1.8s'}`)}
          ${chk(clsOk, cls?.rating==='needs_improvement', `<b>CLS</b> ${cls?.display||'?'} ${clsOk?'— estable':'— inestabilidad visual'}`)}
          ${chk(tbtOk, tbt?.rating==='needs_improvement', `<b>TBT</b> ${tbt?.display||'?'} ${tbtOk?'— bueno':'— JS bloqueante'}`)}
          ${chk(!hasRedirects, false, hasRedirects?`<b>Cadena de redirects</b> — ${hasRedirects.savings_ms}ms perdidos`:'<b>Sin redirects encadenados</b>')}
          ${chk(!hasRenderBlocking, true, hasRenderBlocking?`<b>Recursos bloqueantes</b> (${hasRenderBlocking.affected_count})`:'<b>Sin recursos bloqueantes</b>')}
          ${chk(!hasUnusedJS, true, hasUnusedJS?`<b>JS no usado</b>: ${Math.round((hasUnusedJS.savings_bytes||0)/1024)}KB`:'<b>JS optimizado</b>')}
          ${chk(passesCwvMobile === true, false, passesCwvMobile===true?'<b>Pasa Core Web Vitals</b> (datos reales)':passesCwvMobile===false?'<b>No pasa CWV</b> (datos reales)':'<b>Sin datos CWV</b>')}
        </div>
      </div>
      <div class="card ${scoreClass(perfD)}">
        <div class="card-head"><span class="card-name">🖥 Velocidad Desktop</span><span class="card-score ${badgeClass(perfD)}">${perfD}/100</span></div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${perfD}%;background:${scoreColor(perfD)}"></div></div>
        <div class="checks">
          ${chk(perfD>=90,perfD>=50,`<b>Score Lighthouse</b> ${perfD}/100`)}
          ${chk(passesCwvDesktop === true, false, passesCwvDesktop===true?'<b>Pasa Core Web Vitals</b>':'<b>No pasa CWV</b>')}
          ${chk(a11y>=80,a11y>=50,`<b>Accesibilidad</b> ${a11y}/100`)}
          ${chk(bestP>=80,bestP>=50,`<b>Best Practices</b> ${bestP}/100`)}
          ${chk(seoLH>=80,seoLH>=50,`<b>SEO Lighthouse</b> ${seoLH}/100`)}
        </div>
      </div>
    </div>
  </div>
  ` : ''}

  <!-- SEO -->
  <div class="panel" id="panel-seo">
    <div class="cards-grid">
      <div class="card ${scoreClass(seoScore)}">
        <div class="card-head"><span class="card-name">🔍 SEO Técnico (home)</span><span class="card-score ${badgeClass(seoScore)}">${seoScore}/100</span></div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${seoScore}%;background:${scoreColor(seoScore)}"></div></div>
        <div class="checks">
          ${chk(ha?.technical?.https, false, ha?.technical?.https?'<b>HTTPS</b> activo':'<b>Sin HTTPS</b> — penalización crítica')}
          ${chk(ha?.title?.ok, !ha?.title?.value, `<b>Title</b>: ${ha?.title?.value?`"${escapeHtml(ha.title.value.substring(0,40))}${ha.title.value.length>40?'...':''}" (${ha.title.length} chars)`:'ausente'}`)}
          ${chk(ha?.meta_description?.ok, !!ha?.meta_description?.value&&!ha?.meta_description?.ok, `<b>Meta description</b>: ${ha?.meta_description?.value?`${ha.meta_description.length} chars`:'ausente'}`)}
          ${chk(ha?.headings?.h1_count===1, ha?.headings?.h1_count===0, `<b>H1</b>: ${ha?.headings?.h1_count||0} encontrados`)}
          ${chk(ha?.headings?.h2_count>0, false, `<b>H2</b>: ${ha?.headings?.h2_count||0} · <b>H3</b>: ${ha?.headings?.h3_count||0}`)}
          ${chk(ha?.canonical?.ok, false, ha?.canonical?.ok?`<b>Canonical</b>: presente`:'<b>Sin canonical</b>')}
          ${chk(ha?.open_graph?.ok, !!(ha?.open_graph?.title&&!ha?.open_graph?.image), `<b>Open Graph</b>: title ${ha?.open_graph?.title?'✓':'✕'} · desc ${ha?.open_graph?.description?'✓':'✕'} · image ${ha?.open_graph?.image?'✓':'✕'}`)}
          ${chk(ha?.images?.ok, (ha?.images?.without_alt||0)>0, `<b>Imágenes</b>: ${ha?.images?.total||0} total · ${ha?.images?.without_alt||0} sin alt`)}
          ${chk(rb?.exists, false, rb?.exists?`<b>robots.txt</b> presente${rb.has_sitemap?' + sitemap declarado':''}`:'<b>Sin robots.txt</b>')}
          ${chk(sm?.exists, false, sm?.exists?`<b>sitemap.xml</b>: ${sm.url_count||0} URLs indexadas`:'<b>Sin sitemap.xml</b>')}
        </div>
      </div>
      ${crawlSummary ? `
      <div class="card ${crawlIssues?.broken_internal_links===0&&crawlIssues?.duplicate_titles===0?'g':'a'}">
        <div class="card-head"><span class="card-name">🌐 SEO del sitio (${crawlSummary.pages_analyzed} páginas)</span><span class="card-score sa">crawl</span></div>
        <div class="checks">
          ${chk(crawlIssues?.broken_internal_links===0, false, `<b>Links rotos internos</b>: ${crawlIssues?.broken_internal_links||0}`)}
          ${chk(crawlIssues?.duplicate_titles===0, false, `<b>Titles duplicados</b>: ${crawlIssues?.duplicate_titles||0}`)}
          ${chk(crawlIssues?.no_h1===0, crawlIssues?.no_h1<=2, `<b>Páginas sin H1</b>: ${crawlIssues?.no_h1||0}`)}
          ${chk(crawlIssues?.missing_canonical<3, crawlIssues?.missing_canonical<crawlSummary.pages_analyzed, `<b>Sin canonical</b>: ${crawlIssues?.missing_canonical||0}/${crawlSummary.pages_analyzed}`)}
          ${chk(crawlIssues?.missing_schema===0, false, `<b>Sin schema</b>: ${crawlIssues?.missing_schema||0}/${crawlSummary.pages_analyzed} páginas`)}
          ${chk(crawlIssues?.images_without_alt===0, false, `<b>Imágenes sin alt</b>: ${crawlIssues?.images_without_alt||0} (${crawlIssues?.images_total||0} total)`)}
          ${chk((crawl?.analysis?.link_graph?.orphan_pages_count||0)===0, false, `<b>Páginas huérfanas</b>: ${crawl?.analysis?.link_graph?.orphan_pages_count||0}`)}
          ${chk(crawlSummary.avg_bytes_per_page<200000, false, `<b>Tamaño medio</b>: ${Math.round(crawlSummary.avg_bytes_per_page/1024)}KB/página`)}
        </div>
      </div>
      ` : ''}
    </div>
  </div>

  <!-- AEO con Citability detallado si hay crawl -->
  <div class="panel" id="panel-aeo">
    ${citability ? `
    <div class="cards-grid">
      <div class="card ${scoreClass(citability.score)}" style="grid-column:1/-1">
        <div class="card-head">
          <span class="card-name">🤖 AEO Citability Score — ¿Te citan los LLMs?</span>
          <span class="card-score ${badgeClass(citability.score)}">${citability.score}/100 · ${citability.rating}</span>
        </div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${citability.score}%;background:${scoreColor(citability.score)}"></div></div>
        <div style="margin-top:14px">
          ${Object.entries(citability.dimensions).map(([dim, data]) => `
            <div class="dim-row">
              <div class="dim-name">${dimName(dim)}</div>
              <div class="dim-bar"><div class="dim-fill" style="width:${data.score}%;background:${scoreColor(data.score)}"></div></div>
              <div class="dim-num" style="color:${scoreColor(data.score)}">${data.score}</div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bord);font-size:11px;color:var(--gray2);font-style:italic">
          ${escapeHtml(citability.methodology)}
        </div>
      </div>
    </div>
    ${citability.gaps && citability.gaps.length ? `
    <div class="issues-wrap">
      <div class="issues-title"><span style="color:var(--amber)">▶</span> Mejoras prioritarias para ser citado por IA</div>
      ${citability.gaps.slice(0,8).map(g => `
        <div class="issue">
          <span class="iprio ${g.priority==='high'?'ph':'pm'}">${g.priority==='high'?'ALTA':'MEDIA'}</span>
          <div class="itext"><b>${escapeHtml(g.message)}</b>${escapeHtml(g.fix||'')}</div>
          <span class="icat">${escapeHtml(g.dimension)}</span>
        </div>
      `).join('')}
    </div>
    ` : ''}
    ${schemaVal && schemaVal.recommendations?.length ? `
    <div class="issues-wrap">
      <div class="issues-title"><span style="color:var(--ind3)">📋</span> Recomendaciones de schema markup</div>
      ${schemaVal.recommendations.slice(0,6).map(r => `
        <div class="issue">
          <span class="iprio ${r.priority==='high'?'ph':r.priority==='medium'?'pm':'pl'}">${(r.priority||'').toUpperCase()}</span>
          <div class="itext"><b>${escapeHtml(r.schema_type||'Schema')}</b>${escapeHtml(r.message)}</div>
          <span class="icat">${escapeHtml(r.category||'')}</span>
        </div>
      `).join('')}
    </div>
    ` : ''}
    ` : `
    <div class="cards-grid">
      <div class="card ${scoreClass(aeoScore)}">
        <div class="card-head"><span class="card-name">🤖 AEO — Motores IA</span><span class="card-score ${badgeClass(aeoScore)}">${aeoScore}/100</span></div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${aeoScore}%;background:${scoreColor(aeoScore)}"></div></div>
        <div class="checks">
          ${chk(ha?.schema?.has_schema, false, ha?.schema?.has_schema?`<b>Schema markup</b> presente`:'<b>Sin schema markup</b> — invisible para IA')}
          ${chk(ha?.schema?.has_organization, false, ha?.schema?.has_organization?'<b>Organization schema</b> ✓':'<b>Sin Organization schema</b>')}
          ${chk(ha?.schema?.has_faq, true, ha?.schema?.has_faq?'<b>FAQPage schema</b> ✓':'<b>Sin FAQPage</b>')}
          ${chk(ll?.exists, true, ll?.exists?'<b>llms.txt</b> presente ✓':'<b>Sin llms.txt</b>')}
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--gray2);font-style:italic">El crawl detallado del sitio no se completó. Vista básica.</div>
      </div>
    </div>
    `}
  </div>

  <!-- GEO -->
  <div class="panel" id="panel-geo">
    <div class="cards-grid">
      <div class="card ${scoreClass(geoScore)}">
        <div class="card-head"><span class="card-name">📍 GEO — Búsqueda Local</span><span class="card-score ${badgeClass(geoScore)}">${geoScore}/100</span></div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${geoScore}%;background:${scoreColor(geoScore)}"></div></div>
        <div class="checks">
          ${chk(ha?.schema?.has_local_business, false, ha?.schema?.has_local_business?'<b>LocalBusiness schema</b> ✓':'<b>Sin LocalBusiness schema</b>')}
          ${chk(!!(ha?.schema?.types?.includes?.('Organization')), true, `<b>Organization</b> ${ha?.schema?.types?.includes?.('Organization')?'✓':'✕'}`)}
          ${chk(ha?.hreflang?.ok, true, ha?.hreflang?.ok?`<b>Hreflang</b>: ${ha.hreflang.values.length} variantes`:'<b>Sin hreflang</b> — necesario para España+Latam')}
          ${chk(ha?.technical?.lang, false, ha?.technical?.lang?`<b>Idioma</b>: ${ha.technical.lang}`:'<b>Sin atributo lang</b>')}
          ${chk(rb?.exists, false, rb?.exists?'<b>robots.txt</b> ✓':'<b>Sin robots.txt</b>')}
          ${chk(sm?.exists, false, sm?.exists?`<b>sitemap.xml</b> — ${sm.url_count||0} URLs`:'<b>Sin sitemap.xml</b>')}
        </div>
      </div>
    </div>
  </div>

  ${llmsTxt ? `
  <!-- LLMS.TXT -->
  <div class="panel" id="panel-llms">
    <div class="raw-section">
      <div class="raw-title">
        <span>📝 llms.txt sugerido — copia este archivo a /public/llms.txt</span>
        <button class="copy-btn" id="copyLlms" onclick="copyLlmsTxt()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copiar
        </button>
      </div>
      <div style="font-size:12px;color:var(--gray);margin-bottom:10px">
        ${llmsTxt.stats.total_pages_categorized} páginas categorizadas en ${llmsTxt.stats.sections.length} secciones: ${llmsTxt.stats.sections.join(', ')}.
      </div>
      <div class="code-block" id="llmsContent">${escapeHtml(llmsTxt.content)}</div>
      <div style="margin-top:14px;font-size:12px;color:var(--gray);line-height:1.6">
        <b style="color:var(--white)">¿Por qué importa?</b> El archivo llms.txt orienta a ChatGPT, Perplexity, Claude y otros LLMs sobre el contenido relevante de tu sitio. Mejora cómo te resumen y recomiendan en respuestas de IA. Más info: <a href="https://llmstxt.org/" target="_blank" style="color:var(--ind3)">llmstxt.org</a>
      </div>
    </div>
  </div>
  ` : ''}

  <!-- RAW -->
  <div class="panel" id="panel-raw">
    <div class="raw-section">
      <div class="raw-title">📋 Datos extraídos del HTML (home)</div>
      <div class="raw-grid">
        <div class="raw-item"><div class="raw-key">Title</div><div class="raw-val ${ha?.title?.ok?'ok':ha?.title?.value?'warn':'fail'}">${escapeHtml(ha?.title?.value)||'— no encontrado'}</div></div>
        <div class="raw-item"><div class="raw-key">Meta description</div><div class="raw-val ${ha?.meta_description?.ok?'ok':ha?.meta_description?.value?'warn':'fail'}">${escapeHtml(ha?.meta_description?.value?.substring(0,80))||'— no encontrada'}${(ha?.meta_description?.value?.length||0)>80?'...':''}</div></div>
        <div class="raw-item"><div class="raw-key">Canonical</div><div class="raw-val ${ha?.canonical?.ok?'ok':'fail'}">${escapeHtml(ha?.canonical?.value)||'— no encontrado'}</div></div>
        <div class="raw-item"><div class="raw-key">Schema types</div><div class="raw-val ${ha?.schema?.types?.length?'ok':'fail'}">${ha?.schema?.types?.length?escapeHtml(ha.schema.types.join(', ')):'— ninguno'}</div></div>
        <div class="raw-item"><div class="raw-key">H1 (${ha?.headings?.h1_count||0})</div><div class="raw-val ${ha?.headings?.h1_count===1?'ok':'fail'}">${escapeHtml(ha?.headings?.h1?.[0])||'— no encontrado'}</div></div>
        <div class="raw-item"><div class="raw-key">Hreflang langs</div><div class="raw-val ${ha?.hreflang?.ok?'ok':'warn'}">${ha?.hreflang?.values?.length?escapeHtml(ha.hreflang.values.join(', ')):'— ninguno'}</div></div>
        <div class="raw-item"><div class="raw-key">OG Title</div><div class="raw-val ${ha?.open_graph?.title?'ok':'fail'}">${escapeHtml(ha?.open_graph?.title)||'— no encontrado'}</div></div>
        <div class="raw-item"><div class="raw-key">OG Image</div><div class="raw-val ${ha?.open_graph?.image?'ok':'fail'}">${escapeHtml(ha?.open_graph?.image?.substring(0,50))||'— no encontrada'}</div></div>
        <div class="raw-item"><div class="raw-key">Twitter Card</div><div class="raw-val ${ha?.twitter_card?'ok':'warn'}">${escapeHtml(ha?.twitter_card)||'— no encontrado'}</div></div>
        <div class="raw-item"><div class="raw-key">robots.txt</div><div class="raw-val ${rb?.exists?'ok':'fail'}">${rb?.exists?'Presente':'No encontrado'}</div></div>
        <div class="raw-item"><div class="raw-key">sitemap.xml</div><div class="raw-val ${sm?.exists?'ok':'fail'}">${sm?.exists?`${sm.url_count||0} URLs`:'No encontrado'}</div></div>
        <div class="raw-item"><div class="raw-key">llms.txt</div><div class="raw-val ${ll?.exists?'ok':'warn'}">${ll?.exists?'Presente':'No encontrado'}</div></div>
        <div class="raw-item"><div class="raw-key">Imágenes sin alt</div><div class="raw-val ${(ha?.images?.without_alt||0)===0?'ok':'fail'}">${ha?.images?.without_alt||0} de ${ha?.images?.total||0}</div></div>
        <div class="raw-item"><div class="raw-key">Links internos</div><div class="raw-val">${ha?.links?.internal||0}</div></div>
        <div class="raw-item"><div class="raw-key">Links externos</div><div class="raw-val">${ha?.links?.external||0}</div></div>
        <div class="raw-item"><div class="raw-key">Robots meta</div><div class="raw-val">${escapeHtml(ha?.technical?.robots_meta)||'— no declarado'}</div></div>
      </div>
    </div>
    ${crawl ? `
    <div class="raw-section">
      <div class="raw-title">🌐 Resumen del crawl</div>
      <div class="raw-grid">
        <div class="raw-item"><div class="raw-key">Páginas analizadas</div><div class="raw-val ok">${crawl.discovery?.analyzed||0} de ${crawl.discovery?.total_discovered||0} descubiertas</div></div>
        <div class="raw-item"><div class="raw-key">Fuente</div><div class="raw-val">${escapeHtml(crawl.discovery?.source)}</div></div>
        <div class="raw-item"><div class="raw-key">Tiempo total</div><div class="raw-val">${crawl.duration_ms||0}ms</div></div>
        <div class="raw-item"><div class="raw-key">Tamaño medio</div><div class="raw-val">${Math.round((crawlSummary?.avg_bytes_per_page||0)/1024)}KB</div></div>
        <div class="raw-item"><div class="raw-key">Citabilidad media</div><div class="raw-val ${(crawlSummary?.avg_citability_score||0)>=50?'ok':(crawlSummary?.avg_citability_score||0)>=30?'warn':'fail'}">${crawlSummary?.avg_citability_score||0}/100</div></div>
        <div class="raw-item"><div class="raw-key">Páginas huérfanas</div><div class="raw-val ${(crawl.analysis?.link_graph?.orphan_pages_count||0)===0?'ok':'warn'}">${crawl.analysis?.link_graph?.orphan_pages_count||0}</div></div>
      </div>
    </div>
    ` : ''}
  </div>
  `;

  document.getElementById('resultsSection').innerHTML = html;
  document.getElementById('resultsSection').classList.add('active');
  // Guardar el contenido del llms.txt para el botón copy (sin escapar)
  if (llmsTxt) window._llmsTxtContent = llmsTxt.content;
  document.getElementById('resultsSection').scrollIntoView({behavior:'smooth',block:'start'});
}

function dimName(d) {
  const map = {
    freshness: 'Frescura',
    authorship: 'Autoría',
    factuality: 'Datos',
    structure: 'Estructura',
    citations: 'Citas',
    expertise: 'Expertise',
    machine_readable: 'Machine-read',
    answer_format: 'Formato Q&A'
  };
  return map[d] || d;
}

function copyLlmsTxt() {
  const content = window._llmsTxtContent;
  if (!content) return;
  navigator.clipboard.writeText(content).then(() => {
    const btn = document.getElementById('copyLlms');
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copiado';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar';
    }, 2000);
  }).catch(err => alert('No se pudo copiar: ' + err.message));
}

function switchTab(ev, id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  ev.currentTarget.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

// Pre-fill from URL params
const params = new URLSearchParams(window.location.search);
const preUrl = params.get('url');
if (preUrl) {
  document.getElementById('urlInput').value = preUrl;
  analyze();
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});
</script>
</body>
</html>
